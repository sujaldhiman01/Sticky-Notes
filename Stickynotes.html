```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Sticky Notes</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
transition:0.3s;
}

.dark{
background:#1e1e1e;
color:white;
}

h1{
text-align:center;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
flex-wrap:wrap;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#4CAF50;
color:white;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.notes{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.note{
width:220px;
min-height:200px;
padding:10px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
position:relative;
cursor:grab;
}

textarea{
width:100%;
height:140px;
border:none;
background:transparent;
resize:none;
outline:none;
font-size:14px;
}

.delete{
position:absolute;
top:5px;
right:10px;
font-size:18px;
cursor:pointer;
color:red;
}

.pin{
position:absolute;
top:5px;
left:10px;
cursor:pointer;
}

.color-picker{
margin-top:5px;
}

.pinned{
border:2px solid black;
}

</style>
</head>

<body>

<h1>Sticky Notes</h1>

<div class="controls">

<button onclick="addNote()">Add Note</button>

<input type="text" placeholder="Search notes..." oninput="searchNotes(this.value)">

<button onclick="toggleDark()">Dark Mode</button>

</div>

<div class="notes" id="notesContainer"></div>

<script>

let notes = JSON.parse(localStorage.getItem("notes")) || [];

const container = document.getElementById("notesContainer");

function save(){
localStorage.setItem("notes",JSON.stringify(notes));
}

function render(filtered = notes){

container.innerHTML="";

filtered.sort((a,b)=>b.pinned-a.pinned);

filtered.forEach((note,index)=>{

const div=document.createElement("div");
div.className="note"+(note.pinned?" pinned":"");
div.style.background=note.color;

div.draggable=true;

div.innerHTML=`

<span class="pin" onclick="togglePin(${index})">📌</span>

<span class="delete" onclick="deleteNote(${index})">✖</span>

<textarea oninput="editNote(${index},this.value)">${note.text}</textarea>

<input type="color" class="color-picker" value="${note.color}" onchange="changeColor(${index},this.value)">

`;

container.appendChild(div);

});

}

function addNote(){

notes.push({
text:"",
color:"#fff9a8",
pinned:false
});

save();
render();

}

function editNote(i,val){

notes[i].text=val;
save();

}

function deleteNote(i){

notes.splice(i,1);
save();
render();

}

function changeColor(i,color){

notes[i].color=color;
save();
render();

}

function togglePin(i){

notes[i].pinned=!notes[i].pinned;
save();
render();

}

function searchNotes(query){

const filtered=notes.filter(n=>n.text.toLowerCase().includes(query.toLowerCase()));
render(filtered);

}

function toggleDark(){

document.body.classList.toggle("dark");

}

render();

</script>

</body>
</html>
